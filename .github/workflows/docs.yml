name: Docs site

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  SCW_REGION: fr-par

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docs-out
          path: docs-site/out

  deploy:
    name: Deploy to Scaleway Object Storage
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-out
          path: out

      - name: Configure AWS CLI for Scaleway S3
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.DOCS_SCW_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.DOCS_SCW_SECRET_KEY }}
          aws-region: ${{ env.SCW_REGION }}

      - name: Sync to bucket
        run: |
          aws s3 sync out/ "s3://${{ secrets.DOCS_BUCKET_NAME }}/" \
            --delete \
            --endpoint-url "https://s3.${SCW_REGION}.scw.cloud" \
            --region "${SCW_REGION}"
