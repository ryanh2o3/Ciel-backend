name: Docs site

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  SCW_DEFAULT_REGION: fr-par

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docs-out
          path: docs-site/out

  deploy:
    name: Upload to Scaleway Object Storage
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    env:
      SCW_DEFAULT_REGION: fr-par
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-out
          path: out

      - name: Install s3cmd
        run: sudo apt-get update && sudo apt-get install -y s3cmd

      - name: Install Scaleway CLI
        uses: scaleway/action-scw@v0
        with:
          version: v2.37.0
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_ORGANIZATION_ID }}
          save-config: true

      - name: Sync site to bucket
        run: |
          set -euo pipefail
          scw object config get type=s3cmd > "$HOME/.s3cfg"
          # s3cmd has no --delete; use --delete-removed to drop remote keys missing from out/
          s3cmd --no-mime-magic --guess-mime-type sync out/ "s3://${{ secrets.DOCS_BUCKET_NAME }}/" --delete-removed
