name: Scaleway Terraform CI/CD

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Dockerfile"
      - "migrations/**"
      - "terraform/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Dockerfile"
      - "migrations/**"
      - "terraform/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      force_apply:
        description: "Force terraform apply even if no changes"
        required: false
        default: false
        type: boolean

# Environment variables available to all jobs
env:
  SCW_REGION: fr-par
  SCW_ZONE: fr-par-1
  CONTAINER_REGISTRY: rg.fr-par.scw.cloud/ciel-social
  DOCKER_IMAGE_NAME: ciel-backend

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Generate image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # For manual triggers, use timestamp
            echo "tag=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            # For main branch, use commit SHA
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            # For PRs, use PR number
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.CONTAINER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.CONTAINER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.CONTAINER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:dev-stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-plan:
    name: Terraform Plan
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev]
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.5

      - name: Terraform Init
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.SCW_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.SCW_SECRET_KEY }}"
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}

      - name: Terraform Validate
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          terraform plan -no-color -input=false \
            -var="project_id=${{ secrets.SCW_PROJECT_ID }}" \
            -var="organization_id=${{ secrets.SCW_ORGANIZATION_ID }}" \
            -var="scw_secret_key=${{ secrets.SCW_SECRET_KEY }}" \
            -var="container_image_tag=${{ needs.build-and-push.outputs.image_tag }}"
        env:
          TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}
          TF_VAR_db_user_password: ${{ secrets.DB_USER_PASSWORD }}
          TF_VAR_redis_password: ${{ secrets.REDIS_PASSWORD }}
          TF_VAR_paseto_access_key: ${{ secrets.PASETO_ACCESS_KEY }}
          TF_VAR_paseto_refresh_key: ${{ secrets.PASETO_REFRESH_KEY }}
          TF_VAR_admin_token: ${{ secrets.ADMIN_TOKEN }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}

      - name: Save Terraform Plan
        if: github.event_name != 'pull_request'
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          terraform plan -no-color -input=false -out=tfplan \
            -var="project_id=${{ secrets.SCW_PROJECT_ID }}" \
            -var="organization_id=${{ secrets.SCW_ORGANIZATION_ID }}" \
            -var="scw_secret_key=${{ secrets.SCW_SECRET_KEY }}" \
            -var="container_image_tag=${{ needs.build-and-push.outputs.image_tag }}"
        env:
          TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}
          TF_VAR_db_user_password: ${{ secrets.DB_USER_PASSWORD }}
          TF_VAR_redis_password: ${{ secrets.REDIS_PASSWORD }}
          TF_VAR_paseto_access_key: ${{ secrets.PASETO_ACCESS_KEY }}
          TF_VAR_paseto_refresh_key: ${{ secrets.PASETO_REFRESH_KEY }}
          TF_VAR_admin_token: ${{ secrets.ADMIN_TOKEN }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}

      - name: Upload Terraform Plan
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: terraform/environments/${{ matrix.environment }}/tfplan

  terraform-apply:
    name: Terraform Apply
    needs: [build-and-push, terraform-plan]
    if: github.event_name != 'pull_request' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    # Optional: sync DOCS_* repo secrets via gh CLI (often fails with GITHUB_TOKEN — use a PAT or set secrets manually; see docs-site/README.md).
    strategy:
      matrix:
        environment: [dev]
      max-parallel: 1 # Deploy environments sequentially
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.5

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: terraform/environments/${{ matrix.environment }}

      - name: Terraform Init
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.SCW_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.SCW_SECRET_KEY }}"
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}

      - name: Terraform Apply
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}
          TF_VAR_db_user_password: ${{ secrets.DB_USER_PASSWORD }}
          TF_VAR_redis_password: ${{ secrets.REDIS_PASSWORD }}
          TF_VAR_paseto_access_key: ${{ secrets.PASETO_ACCESS_KEY }}
          TF_VAR_paseto_refresh_key: ${{ secrets.PASETO_REFRESH_KEY }}
          TF_VAR_admin_token: ${{ secrets.ADMIN_TOKEN }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}

      # Non-sensitive outputs: open the workflow run → Summary tab (or expand this step’s log).
      - name: Terraform outputs (job summary)
        if: success()
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          {
            echo "## Terraform outputs (${{ matrix.environment }})"
            echo ""
            echo "Sensitive outputs (e.g. \`docs_deploy_secret_key\`, database URLs) are **not** printed. With repo + Scaleway state access locally: \`terraform output\` or \`terraform output -raw <name>\`."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          for name in docs_bucket_name docs_dns_cname_target docs_public_url docs_edge_pipeline_id docs_dns_record docs_website_domain; do
            val=$(terraform output -raw "$name" 2>/dev/null) || continue
            if [ -n "$val" ] && [ "$val" != "null" ]; then
              echo "- **${name}**: \`${val}\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      # Docs workflow needs DOCS_* secrets; values live in remote state after apply.
      # Pipe straight into `gh secret set` so sensitive values are not printed to the log.
      - name: Sync docs-site secrets from Terraform outputs
        id: sync-docs-secrets
        if: success()
        working-directory: terraform/environments/${{ matrix.environment }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! terraform output -json docs_bucket_name >/dev/null 2>&1; then
            echo "No docs_bucket_name output; skipping DOCS_* secrets."
            exit 0
          fi
          BUCKET=$(terraform output -raw docs_bucket_name)
          if [ -z "$BUCKET" ] || [ "$BUCKET" = "null" ]; then
            echo "Docs bucket disabled for this environment; skipping."
            exit 0
          fi
          terraform output -raw docs_bucket_name | gh secret set DOCS_BUCKET_NAME --repo "${{ github.repository }}"
          terraform output -raw docs_deploy_access_key | gh secret set DOCS_SCW_ACCESS_KEY --repo "${{ github.repository }}"
          terraform output -raw docs_deploy_secret_key | gh secret set DOCS_SCW_SECRET_KEY --repo "${{ github.repository }}"
          echo "### Docs site" >> "$GITHUB_STEP_SUMMARY"
          echo "Updated repository secrets: \`DOCS_BUCKET_NAME\`, \`DOCS_SCW_ACCESS_KEY\`, \`DOCS_SCW_SECRET_KEY\` (from Terraform outputs)." >> "$GITHUB_STEP_SUMMARY"
          echo "Run the **Docs site** workflow or push to \`docs-site/**\` to deploy static files." >> "$GITHUB_STEP_SUMMARY"

      - name: Docs-site secrets hint (if sync step failed)
        if: success() && steps.sync-docs-secrets.outcome == 'failure'
        run: |
          echo "::warning::Automatic DOCS_* secret sync failed (permissions or gh CLI). Set DOCS_BUCKET_NAME, DOCS_SCW_ACCESS_KEY, DOCS_SCW_SECRET_KEY manually — see docs-site/README.md."

  # Database migrations now run on the instance via cloud-init (after docker compose up).
  # The instance is on the private network and can reach the database directly.

  notify:
    name: Deployment Notification
    needs: [terraform-apply]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        if: github.event_name != 'pull_request' && vars.SLACK_WEBHOOK_URL != ''
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ vars.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: ${{ needs.terraform-apply.result == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: "Ciel Deployment ${{ needs.terraform-apply.result == 'success' && 'Succeeded' || 'Failed' }}"
          SLACK_MESSAGE: "Environment deployed: ${{ matrix.environment || 'dev' }}"
          SLACK_FOOTER: "Triggered by ${{ github.actor }}"
