#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - openssl
  - unattended-upgrades

write_files:
  - path: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }

  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

  - path: /opt/ciel/.env
    permissions: '0600'
    content: |
      APP_MODE=api
      HTTP_ADDR=${http_addr}
      DATABASE_URL=${database_url}
      REDIS_URL=${redis_url}
      S3_ENDPOINT=${s3_endpoint}
      S3_REGION=${s3_region}
      S3_BUCKET=${s3_bucket}
      S3_PUBLIC_ENDPOINT=${s3_public_endpoint}
      AWS_ACCESS_KEY_ID=${s3_access_key}
      AWS_SECRET_ACCESS_KEY=${s3_secret_key}
      QUEUE_ENDPOINT=${queue_endpoint}
      QUEUE_REGION=${queue_region}
      QUEUE_NAME=${queue_name}
      SQS_ACCESS_KEY=${sqs_access_key}
      SQS_SECRET_KEY=${sqs_secret_key}
      PASETO_ACCESS_KEY=${paseto_access_key}
      PASETO_REFRESH_KEY=${paseto_refresh_key}
      ADMIN_TOKEN=${admin_token}
      RUST_LOG=${rust_log}

  - path: /opt/ciel/docker-compose.yml
    content: |
      services:
        api:
          image: ${container_image}:${image_tag}
          restart: unless-stopped
          env_file:
            - .env
          logging:
            driver: json-file
            options:
              max-size: "10m"
              max-file: "3"
          healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        proxy:
          image: nginx:alpine
          restart: unless-stopped
          ports:
            - "8443:8443"
          volumes:
            - /opt/ciel/nginx.conf:/etc/nginx/nginx.conf:ro
            - /opt/ciel/tls:/etc/nginx/tls:ro
          depends_on:
            - api

%{ if migration_database_url != "" ~}
  - path: /opt/ciel/migration_db_url.txt
    permissions: '0600'
    content: |
      ${migration_database_url}

%{ endif ~}
  - path: /opt/ciel/nginx.conf
    content: |
      events {}
      http {
        server {
          listen 8443 ssl;
          ssl_certificate /etc/nginx/tls/cert.pem;
          ssl_certificate_key /etc/nginx/tls/key.pem;
          ssl_protocols TLSv1.2 TLSv1.3;
          location / {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
          }
        }
      }

runcmd:
  # Install Docker
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian $(. /etc/os-release && echo $VERSION_CODENAME) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin

  # Configure unattended upgrades
  - dpkg-reconfigure -f noninteractive unattended-upgrades
  - systemctl enable unattended-upgrades

  # Generate internal TLS certificate for LB-to-instance encryption
  - mkdir -p /opt/ciel/tls
  - openssl req -x509 -nodes -days 3650 -newkey rsa:2048 -keyout /opt/ciel/tls/key.pem -out /opt/ciel/tls/cert.pem -subj \"/CN=internal.ciel.local\"

  # Login to Scaleway Container Registry using scoped IAM key
  - echo "${scw_secret_key}" | docker login rg.${scw_region}.scw.cloud -u ${scw_access_key} --password-stdin

  # Pull the application image
  - cd /opt/ciel && docker compose pull

%{ if migration_database_url != "" ~}
  # Run database migrations BEFORE the API starts so it never serves against
  # a missing or outdated schema. ON_ERROR_STOP aborts on the first failed
  # statement (all migrations are idempotent); the advisory lock serializes
  # concurrent runs from multiple instances booting at the same time. On
  # success a marker file gates the compose up step below.
  - |
    set -e
    docker create --name tmp-migrate ${container_image}:${image_tag}
    docker cp tmp-migrate:/app/migrations /opt/ciel/migrations
    docker rm tmp-migrate
    MIGRATION_URL=$(cat /opt/ciel/migration_db_url.txt)
    docker run --rm --network=host \
      -v /opt/ciel/migrations:/migrations:ro \
      -e "DATABASE_URL=$MIGRATION_URL" \
      postgres:16-alpine \
      sh -ec '
        files=""
        for f in $(ls /migrations/*.sql | sort); do
          echo "Queueing $f"
          files="$files -f $f"
        done
        psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
          -c "SELECT pg_advisory_lock(728132)" \
          $files \
          -c "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO ${db_user};" \
          -c "GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO ${db_user};" \
          -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO ${db_user};" \
          -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO ${db_user};"
      '
    rm -f /opt/ciel/migration_db_url.txt
    touch /opt/ciel/.migrations-ok
    echo "=== MIGRATIONS COMPLETE ==="

  # Start the application only if migrations succeeded
  - test -f /opt/ciel/.migrations-ok && cd /opt/ciel && docker compose up -d
%{ else ~}
  # Start the application (migrations are handled elsewhere for this deployment)
  - cd /opt/ciel && docker compose up -d
%{ endif ~}

  # Enable Docker to start on boot
  - systemctl enable docker
